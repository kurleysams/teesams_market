  teesams_market_ios:
    name: Teesams Market iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: teesamsmarket

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.teesams.teesamsMarket"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.teesams.teesamsMarket

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Flutter version
        script: |
          flutter --version

      - name: Get packages
        script: |
          flutter pub get

      - name: Generate app icons and splash
        script: |
          dart run flutter_launcher_icons
          dart run flutter_native_splash:create

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Analyze
        script: |
          flutter analyze --no-fatal-infos || true

      - name: Run tests
        script: |
          flutter test

      - name: Verify bundle identifier
        script: |
          echo "Expected bundle id: $BUNDLE_ID"
          echo "Project bundle ids:"
          grep -n "PRODUCT_BUNDLE_IDENTIFIER" ios/Runner.xcodeproj/project.pbxproj || true
          echo "Info.plist bundle id:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" ios/Runner/Info.plist || true
          echo "Entitlements files:"
          find ios -name "*.entitlements" -print || true

      - name: Configure code signing
        script: |
          xcode-project use-profiles \
            --project ios/Runner.xcodeproj \
            --archive-method app-store \
            --code-signing-setup-verbose-logging

      - name: Create ExportOptions.plist
        script: |
          cat > /tmp/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>72FK28VS65</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.teesams.teesamsMarket</key>
              <string>Teesams Market Store</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Build iOS IPA
        script: |
          set -euo pipefail

          flutter clean
          flutter pub get

          flutter build ipa --release --export-options-plist=/tmp/ExportOptions.plist --verbose 2>&1 | tee /tmp/flutter_build_ipa.log

          echo "==== IPA search ===="
          find . -type f -name "*.ipa" | sort || true
          find "$CM_BUILD_DIR" -type f -name "*.ipa" | sort || true

          echo "==== Archive search ===="
          find . -type d -name "*.xcarchive" | sort || true
          find "$CM_BUILD_DIR" -type d -name "*.xcarchive" | sort || true

          echo "==== Likely errors from build log ===="
          grep -Ei "error:|exportArchive|provision|profile|signing|entitlement|requires a provisioning profile|No profiles for|Code signing is required|No signing certificate" /tmp/flutter_build_ipa.log || true

          test -n "$(find . -type f -name '*.ipa' -print -quit)" || {
            echo "No IPA produced by flutter build ipa"
            exit 1
          }

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - /tmp/flutter_build_ipa.log
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - samuel.omopariola.nhs@gmail.com
      app_store_connect:
        auth: integration