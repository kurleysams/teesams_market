  teesams_market_ios:
    name: Teesams Market iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: teesamsmarket

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.teesams.teesamsMarket"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.teesams.teesamsMarket

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Flutter version
        script: |
          flutter --version

      - name: Get packages
        script: |
          flutter pub get

      - name: Generate app icons and splash
        script: |
          dart run flutter_launcher_icons
          dart run flutter_native_splash:create

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Analyze
        script: |
          flutter analyze --no-fatal-infos || true

      - name: Run tests
        script: |
          flutter test

      - name: Verify bundle identifier
        script: |
          echo "Expected bundle id: $BUNDLE_ID"
          echo "Project bundle ids:"
          grep -n "PRODUCT_BUNDLE_IDENTIFIER" ios/Runner.xcodeproj/project.pbxproj || true
          echo "Info.plist bundle id:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" ios/Runner/Info.plist || true
          echo "Entitlements files:"
          find ios -name "*.entitlements" -print || true

      - name: Build iOS IPA
        script: |
          set -euo pipefail
          xcode-project use-profiles
          flutter clean
          flutter pub get
          flutter build ipa --release --export-method app-store --verbose | tee /tmp/flutter_build_ipa.log

          echo "Searching repo for IPA files..."
          find . -type f -name "*.ipa" | sort || true

          echo "Searching CM_BUILD_DIR for IPA files..."
          find "$CM_BUILD_DIR" -type f -name "*.ipa" | sort || true

          echo "Listing build/ios contents..."
          find build/ios -maxdepth 6 -type f | sort || true

          echo "Xcode logs..."
          find /tmp/xcodebuild_logs -type f | sort || true

          test -n "$(find . -type f -name '*.ipa' -print -quit)" || {
            echo "No IPA produced by flutter build ipa"
            exit 1
          }

    artifacts:
      - build/ios/ipa/*.ipa
      - $CM_BUILD_DIR/**/build/ios/ipa/*.ipa
      - $CM_BUILD_DIR/**/*.ipa
      - build/ios/archive/*.xcarchive
      - $CM_BUILD_DIR/**/build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
      - /tmp/flutter_build_ipa.log
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - samuel.omopariola.nhs@gmail.com
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers