name: teesams_market
description: "Teesams Market – a marketplace app for fresh seafood, groceries, and local store shopping."

publish_to: 'none'

version: 1.0.1+5

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2
  file_picker: ^8.1.2
  intl: ^0.19.0

  # Local storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^10.0.0

  # Networking
  dio: ^5.7.0

  # Payments
  flutter_stripe: ^12.0.1

  # Media & utilities
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  app_links: ^7.0.0

  # UI
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Branding
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.0


flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/icon_1024x1024_noalpha.png
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icons/icon_1024x1024_noalpha.png


flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icons/icon_1024x1024_noalpha.png
  android: true
  ios: true


flutter:
  uses-material-design: true

  assets:
    - assets/icons/